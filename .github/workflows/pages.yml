# GitHub Actions workflow to build OKF bundles and deploy to GitHub Pages.
#
# This workflow is triggered by:
#   - Push to main that touches data, ontology, pipeline, or docs
#   - Merged pull requests (including auto-discovery PRs)
#   - Manual workflow dispatch
#
# It does NOT discover new servers — that's handled by discover.yml.
# This workflow only builds OKF bundles, generates views, and deploys.

name: Build and Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "ontology/**"
      - "pipeline/**"
      - "docs/**"
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build OKF Bundle & Views
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate OKF data
        run: |
          python -m pipeline.build_okf \
            --input data \
            --output /tmp/okf_validation \
            --validate-only
        # Fail the build if OKF data is invalid

      - name: Build OKF bundle
        run: |
          python -m pipeline.build_okf \
            --input data \
            --output docs/assets/js

      - name: Generate views
        run: |
          python -m pipeline.views.generate_views \
            --input data \
            --output docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Summary
        run: |
          echo "## Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- OKF bundle: \`docs/assets/js/okf_data.js\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Views generated in \`docs/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
