# GitHub Actions workflow to build OKF bundles and deploy documentation to GitHub Pages.
#
# Triggers:
#   - Push to main that touches data, ontology, pipeline, or docs
#   - Manual workflow dispatch
#   - Weekly schedule (Sundays at 00:00 UTC)
#
# The workflow builds the OKF bundle, generates views, and deploys the docs/ folder
# to GitHub Pages using the modern actions/deploy-pages action.

name: Build and Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "ontology/**"
      - "pipeline/**"
      - "docs/**"
  workflow_dispatch:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

# Prevent overlapping runs — queue by branch, cancel in-progress runs.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build OKF Bundle & Views
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository with full git history.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python 3.11.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run OKF builder.
      - name: Build OKF bundle
        run: |
          python -m pipeline.build_okf \
            --input data \
            --output docs/assets/js

      # 5. Generate views.
      - name: Generate views
        run: |
          python -m pipeline.views.generate_views \
            --input data \
            --output docs

      # 6. Upload docs/ as a Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 7. Deploy to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
