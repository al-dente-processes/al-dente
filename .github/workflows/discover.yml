# GitHub Actions workflow for automated MCP server discovery.
#
# This workflow runs cyclically (weekly) to discover new MCP servers from
# canonical sources (Official MCP Registry, PulseMCP, GitHub Topics).
#
# Quality gates ensure only high-signal servers are added.
# New servers are committed to data/mcp-servers/ and a PR is created
# for human review before merging.
#
# The workflow can also be triggered manually with configurable options.

name: Discover MCP Servers

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/discover.yml"
      - "pipeline/discover/**"
  schedule:
    # Every Sunday at 02:00 UTC (2 hours before the build to allow PR review)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      preset:
        description: "Quality gate preset"
        required: true
        default: "balanced"
        type: choice
        options:
          - strict
          - balanced
          - lenient
      dry_run:
        description: "Dry run (don't commit changes)"
        required: false
        default: false
        type: boolean
      bootstrap:
        description: "Bootstrap mode — unlimited servers + full skill taxonomy"
        required: false
        default: false
        type: boolean
      max_servers:
        description: "Max servers per run (ignored in bootstrap mode)"
        required: false
        default: 50
        type: number
      max_pages:
        description: "Max registry pages to crawl"
        required: false
        default: 5
        type: number

# Prevent overlapping runs
concurrency:
  group: "discovery"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  discover:
    name: Discover & Quality Gate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run discovery pipeline
      - name: Run discovery pipeline
        id: discovery
        env:
          PULSE_MCP_API_KEY: ${{ secrets.PULSE_MCP_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRESET="${{ github.event.inputs.preset || 'balanced' }}"

          # Determine mode: bootstrap on manual trigger if requested, else weekly
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.bootstrap }}" == "true" ]]; then
            MODE_FLAG="--bootstrap"
            echo "Running in BOOTSTRAP mode (unlimited)"
          else
            MODE_FLAG="--max-servers ${{ github.event.inputs.max_servers || '50' }}"
            echo "Running in incremental mode ($MODE_FLAG)"
          fi

          python -m pipeline.discover.runner \
            --preset "$PRESET" \
            $MODE_FLAG \
            2>&1 | tee discovery.log

          # Extract stats from DISCOVERY_STATS line
          STATS_LINE=$(grep "DISCOVERY_STATS:" discovery.log || echo "")
          echo "Raw stats: $STATS_LINE"

          # Parse key=value pairs
          PASSED=$(echo "$STATS_LINE" | grep -oP 'passed=\K[0-9]+' || echo "0")
          ADDED=$(echo "$STATS_LINE" | grep -oP 'added=\K[0-9]+' || echo "0")
          UPDATED=$(echo "$STATS_LINE" | grep -oP 'updated=\K[0-9]+' || echo "0")
          SKILLS=$(echo "$STATS_LINE" | grep -oP 'skills=\K[0-9]+' || echo "0")

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"

      # 5. Check for changes
      - name: Check for changes
        id: git-check
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new servers discovered."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changes<<EOF" >> "$GITHUB_OUTPUT"
            git diff --cached --stat >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      # 6. Commit changes (on schedule or manual dispatch only — NOT on push)
      - name: Commit new servers
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true' && github.event_name != 'push'
        run: |
          git config user.name "al-dente-bot"
          git config user.email "bot@al-dente.dev"
          git commit -m "auto: discover servers (${{ steps.discovery.outputs.passed }} passed, ${{ steps.discovery.outputs.added }} added, ${{ steps.discovery.outputs.skills }} skills)"

      # 7. Create Pull Request (on schedule)
      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/discover-servers-${{ github.run_number }}
          title: "chore: auto-discover MCP servers — ${{ steps.discovery.outputs.passed }} new entries"
          body: |
            ## Automated Discovery Results

            | Metric | Count |
            |--------|-------|
            | Servers passed quality gate | ${{ steps.discovery.outputs.passed }} |
            | New servers added | ${{ steps.discovery.outputs.added }} |
            | Existing servers updated | ${{ steps.discovery.outputs.updated }} |

            ### Quality Preset: ${{ github.event.inputs.preset || 'balanced' }}

            ### Files Changed
            ```
            ${{ steps.git-check.outputs.changes }}
            ```

            ---
            *This PR was auto-generated by the [Discover MCP Servers](https://github.com/${{ github.repository }}/actions/workflows/discover.yml) workflow.*

            **Review Checklist:**
            - [ ] Verify server entries have correct tier assignments
            - [ ] Check descriptions are meaningful and accurate
            - [ ] Confirm categorization is appropriate
            - [ ] Merge if everything looks good
          labels: |
            auto-discovery
            data
          draft: false

      # 8. Push directly (on manual trigger without dry_run)
      - name: Push to main
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true' && github.event_name == 'workflow_dispatch'
        run: git push origin main

      # 9. Build OKF + deploy to Pages (GITHUB_TOKEN push doesn't trigger other workflows)
      - name: Build OKF bundle
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          python -m pipeline.build_okf \
            --input data \
            --output docs/assets/js

      - name: Upload Pages artifact
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      # 10. Summary
      - name: Summary
        run: |
          echo "## Discovery Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Preset | ${{ github.event.inputs.preset || 'balanced' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Servers passed gate | ${{ steps.discovery.outputs.passed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New files | ${{ steps.discovery.outputs.added }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Updated files | ${{ steps.discovery.outputs.updated }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skills generated | ${{ steps.discovery.outputs.skills }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Changes committed | ${{ steps.git-check.outputs.changed == 'true' && 'Yes' || 'No' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ github.event.inputs.dry_run == 'true' && 'Yes' || 'No' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bootstrap | ${{ github.event.inputs.bootstrap == 'true' && 'Yes' || 'No' }} |" >> "$GITHUB_STEP_SUMMARY"
