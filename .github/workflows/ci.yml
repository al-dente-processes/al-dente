# CI workflow — validates OKF data integrity on pull requests.
#
# Runs on every PR that touches data, ontology, or pipeline files.
# Ensures OKF entries conform to the schema before merging.

name: CI — Validate OKF

on:
  pull_request:
    paths:
      - "data/**"
      - "ontology/**"
      - "pipeline/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate OKF Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate OKF schema
        run: |
          python -m pipeline.build_okf \
            --input data \
            --output /tmp/okf_validation \
            --validate-only

      - name: Check for new/modified servers
        run: |
          echo "## OKF Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Count files
          SERVER_COUNT=$(find data/mcp-servers -name "*.md" | wc -l)
          SKILL_COUNT=$(find data/skills -name "*.md" | wc -l)
          echo "| Entity Type | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| MCP Servers | $SERVER_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skills | $SKILL_COUNT |" >> "$GITHUB_STEP_SUMMARY"

          # Show modified files in this PR
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Modified Files" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only origin/main...HEAD >> "$GITHUB_STEP_SUMMARY" || true
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
